<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header><mat-card-title><h1>Forgot Password</h1></mat-card-title></mat-card-header>
    <mat-card-content>
      <p>Enter your email to receive a reset OTP.</p>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" [(ngModel)]="email" />
      </mat-form-field>
      <button mat-raised-button color="primary" class="full-width" (click)="send()" [disabled]="loading">Send OTP</button>
      <div class="links"><a routerLink="/login">Back to Login</a></div>
    </mat-card-content>
  </mat-card>
</div>
