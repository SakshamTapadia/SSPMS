<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">Users</h1>
      <p class="page-sub">Manage all system users and their roles</p>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Search</mat-label>
      <input matInput [formControl]="searchCtrl" placeholder="Name or email...">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline" class="filter-field">
      <mat-label>Role</mat-label>
      <mat-select [(value)]="roleFilter" (selectionChange)="onRoleFilterChange()">
        <mat-option value="">All Roles</mat-option>
        <mat-option value="Admin">Admin</mat-option>
        <mat-option value="Trainer">Trainer</mat-option>
        <mat-option value="Employee">Employee</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="filter-field">
      <mat-label>Status</mat-label>
      <mat-select [(value)]="activeFilter" (selectionChange)="onActiveFilterChange()">
        <mat-option value="">All</mat-option>
        <mat-option value="true">Active</mat-option>
        <mat-option value="false">Inactive</mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="loading-row"><mat-spinner diameter="40"></mat-spinner></div>

  <!-- Table -->
  <mat-card *ngIf="!loading && result">
    <table mat-table [dataSource]="result.items" class="full-width">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let u">
          <div class="user-cell">
            <span class="avatar-chip" [class]="'role-' + u.role.toLowerCase()">{{ u.name[0] }}</span>
            <span class="user-name">{{ u.name }}</span>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let u">{{ u.email }}</td>
      </ng-container>

      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>Role</th>
        <td mat-cell *matCellDef="let u">
          <mat-select *ngIf="u.role !== 'Admin'; else adminBadge"
            [value]="u.role"
            [disabled]="changingRole[u.id]"
            (selectionChange)="changeRole(u, $event.value)"
            class="role-select">
            <mat-option value="Trainer">Trainer</mat-option>
            <mat-option value="Employee">Employee</mat-option>
          </mat-select>
          <ng-template #adminBadge>
            <span class="role-badge admin">Admin</span>
          </ng-template>
        </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let u">
          <span class="status-badge" [class.active]="u.isActive" [class.inactive]="!u.isActive">
            {{ u.isActive ? 'Active' : 'Inactive' }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let u">
          <button *ngIf="u.role !== 'Admin'"
            mat-stroked-button
            [color]="u.isActive ? 'warn' : 'primary'"
            [disabled]="togglingStatus[u.id]"
            (click)="toggleStatus(u)">
            {{ u.isActive ? 'Deactivate' : 'Reactivate' }}
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator
      *ngIf="result.totalCount > pageSize"
      [length]="result.totalCount"
      [pageSize]="pageSize"
      [pageSizeOptions]="[10, 20, 50]"
      (page)="onPageChange($event)">
    </mat-paginator>
  </mat-card>

  <div *ngIf="!loading && result?.items?.length === 0" class="empty-state">
    <mat-icon>people_outline</mat-icon>
    <p>No users found.</p>
  </div>
</div>
