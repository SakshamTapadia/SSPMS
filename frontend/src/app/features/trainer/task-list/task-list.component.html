<div class="page-header">
  <h2>Tasks</h2>
  <div class="header-actions">
    <mat-form-field appearance="outline" class="class-filter">
      <mat-label>Filter by Class</mat-label>
      <mat-select [(ngModel)]="selectedClass" (selectionChange)="loadTasks()">
        <mat-option value="">All Classes</mat-option>
        <mat-option *ngFor="let c of classes" [value]="c.id">{{ c.name }}</mat-option>
      </mat-select>
    </mat-form-field>
    <button mat-raised-button color="primary" routerLink="/trainer/tasks/new"><mat-icon>add</mat-icon> New Task</button>
  </div>
</div>

<mat-card>
  <mat-card-content>
    <mat-progress-bar mode="indeterminate" *ngIf="loading"></mat-progress-bar>
    <mat-table [dataSource]="tasks" *ngIf="!loading">
      <ng-container matColumnDef="title">
        <mat-header-cell *matHeaderCellDef>Title</mat-header-cell>
        <mat-cell *matCellDef="let t"><a [routerLink]="['/trainer/tasks', t.id]">{{ t.title }}</a></mat-cell>
      </ng-container>
      <ng-container matColumnDef="class"><mat-header-cell *matHeaderCellDef>Class</mat-header-cell><mat-cell *matCellDef="let t">{{ t.className }}</mat-cell></ng-container>
      <ng-container matColumnDef="marks"><mat-header-cell *matHeaderCellDef>Marks</mat-header-cell><mat-cell *matCellDef="let t">{{ t.totalMarks }}</mat-cell></ng-container>
      <ng-container matColumnDef="questions"><mat-header-cell *matHeaderCellDef>Questions</mat-header-cell><mat-cell *matCellDef="let t">{{ t.questionCount }}</mat-cell></ng-container>
      <ng-container matColumnDef="submissions"><mat-header-cell *matHeaderCellDef>Submissions</mat-header-cell><mat-cell *matCellDef="let t">{{ t.submissionCount }}</mat-cell></ng-container>
      <ng-container matColumnDef="status">
        <mat-header-cell *matHeaderCellDef>Status</mat-header-cell>
        <mat-cell *matCellDef="let t"><span [class]="'badge badge-' + t.status.toLowerCase()">{{ t.status }}</span></mat-cell>
      </ng-container>
      <ng-container matColumnDef="actions">
        <mat-header-cell *matHeaderCellDef></mat-header-cell>
        <mat-cell *matCellDef="let t">
          <button mat-icon-button [routerLink]="['/trainer/tasks', t.id]" matTooltip="Edit"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button (click)="publish(t.id)" *ngIf="t.status === 'Draft'" matTooltip="Publish" color="primary"><mat-icon>publish</mat-icon></button>
          <button mat-icon-button [routerLink]="['/trainer/tasks', t.id, 'evaluate']" *ngIf="t.status !== 'Draft'" matTooltip="Evaluate"><mat-icon>grading</mat-icon></button>
          <button mat-icon-button (click)="duplicate(t.id)" matTooltip="Duplicate"><mat-icon>content_copy</mat-icon></button>
          <button mat-icon-button (click)="delete(t.id)" *ngIf="t.status === 'Draft'" matTooltip="Delete" color="warn"><mat-icon>delete</mat-icon></button>
        </mat-cell>
      </ng-container>
      <mat-header-row *matHeaderRowDef="['title','class','marks','questions','submissions','status','actions']"></mat-header-row>
      <mat-row *matRowDef="let row; columns: ['title','class','marks','questions','submissions','status','actions']"></mat-row>
    </mat-table>
    <div class="empty" *ngIf="!loading && tasks.length === 0">No tasks found. Create your first task!</div>
  </mat-card-content>
</mat-card>
