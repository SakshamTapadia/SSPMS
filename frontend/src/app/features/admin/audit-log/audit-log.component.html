<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">Audit Log</h1>
      <p class="page-sub">All system events and user actions</p>
    </div>
  </div>

  <div class="filters-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Filter by action</mat-label>
      <input matInput [formControl]="actionCtrl" placeholder="e.g. Login, Register...">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
  </div>

  <div *ngIf="loading" class="loading-row"><mat-spinner diameter="40"></mat-spinner></div>

  <mat-card *ngIf="!loading">
    <div *ngIf="logs.length === 0" class="empty-state">
      <mat-icon>manage_search</mat-icon>
      <p>No audit log entries found.</p>
    </div>

    <table *ngIf="logs.length > 0" mat-table [dataSource]="logs" class="full-width">
      <ng-container matColumnDef="timestamp">
        <th mat-header-cell *matHeaderCellDef>Time</th>
        <td mat-cell *matCellDef="let l" class="mono">{{ l.timestamp | date:'dd MMM HH:mm:ss' }}</td>
      </ng-container>

      <ng-container matColumnDef="user">
        <th mat-header-cell *matHeaderCellDef>User</th>
        <td mat-cell *matCellDef="let l">{{ l.userName || '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef>Action</th>
        <td mat-cell *matCellDef="let l">
          <span class="action-badge" [class]="badgeClass(l.action)">{{ l.action }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="entity">
        <th mat-header-cell *matHeaderCellDef>Entity</th>
        <td mat-cell *matCellDef="let l">{{ l.entity || '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="ip">
        <th mat-header-cell *matHeaderCellDef>IP</th>
        <td mat-cell *matCellDef="let l" class="mono">{{ l.iPAddress || l.ipAddress || '—' }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator
      *ngIf="totalCount > pageSize"
      [length]="totalCount"
      [pageSize]="pageSize"
      [pageSizeOptions]="[25, 50, 100]"
      (page)="onPageChange($event)">
    </mat-paginator>
  </mat-card>
</div>
