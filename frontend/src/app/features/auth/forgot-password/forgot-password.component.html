<div class="login-page">
  <div class="login-panel">
    <div class="login-inner">

      <div class="login-brand">
        <div class="brand-mark">S</div>
        <span class="brand-label">SSPMS</span>
      </div>

      <div class="login-heading">
        <h1>Forgot Password</h1>
        <p>Enter your registered email and we'll send you a reset OTP.</p>
      </div>

      <div class="login-form">
        <div class="field-group">
          <label class="field-label">Email address</label>
          <mat-form-field appearance="outline" class="field-full">
            <input matInput type="email" [(ngModel)]="email" placeholder="you@example.com"
                   (keyup.enter)="send()" />
          </mat-form-field>
        </div>

        <button class="submit-btn" (click)="send()" [disabled]="loading || !email.trim()">
          <mat-spinner *ngIf="loading" diameter="18"></mat-spinner>
          <span *ngIf="!loading">Send OTP</span>
        </button>

        <p class="alt-link"><a routerLink="/login">Back to Login</a></p>
      </div>

    </div>
  </div>

  <div class="hero-panel">
    <div class="hero-content">
      <div class="hero-badge">
        <mat-icon style="font-size:14px;width:14px;height:14px">lock_reset</mat-icon>
        Secure Reset
      </div>
      <h2 class="hero-title">Reset your<br/>password safely</h2>
      <p class="hero-sub">We'll send a one-time code to your email. It expires in 15 minutes and can only be used once.</p>
    </div>
  </div>
</div>
