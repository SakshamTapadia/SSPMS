<div class="login-container"><mat-card class="login-card"><mat-card-header><mat-card-title><h1>Reset Password</h1></mat-card-title></mat-card-header><mat-card-content><mat-form-field appearance="outline" class="full-width"><mat-label>OTP Code</mat-label><input matInput [(ngModel)]="otp" /></mat-form-field><mat-form-field appearance="outline" class="full-width"><mat-label>New Password</mat-label><input matInput type="password" [(ngModel)]="newPassword" /></mat-form-field><button mat-raised-button color="primary" class="full-width" (click)="reset()" [disabled]="loading">Reset Password</button><div class="links"><a routerLink="/login">Back to Login</a></div></mat-card-content></mat-card></div>
