<div class="app-shell">
  <!-- Mobile overlay -->
  <div class="sidebar-overlay" [class.open]="sidebarOpen" (click)="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" [class.open]="sidebarOpen">
    <div class="sidebar-brand">
      <div class="brand-logo">S</div>
      <div class="brand-text">
        <span class="brand-name">SSPMS</span>
        <span class="brand-role">Admin</span>
      </div>
      <button class="sidebar-close-btn" (click)="closeSidebar()">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item" routerLink="dashboard" routerLinkActive="active" (click)="closeSidebar()">
        <mat-icon class="nav-icon">grid_view</mat-icon>
        <span>Dashboard</span>
      </a>
      <a class="nav-item" routerLink="users" routerLinkActive="active" (click)="closeSidebar()">
        <mat-icon class="nav-icon">people</mat-icon>
        <span>Users</span>
      </a>
      <a class="nav-item" routerLink="classes" routerLinkActive="active" (click)="closeSidebar()">
        <mat-icon class="nav-icon">school</mat-icon>
        <span>Classes</span>
      </a>
      <a class="nav-item" routerLink="tasks" routerLinkActive="active" (click)="closeSidebar()">
        <mat-icon class="nav-icon">assignment</mat-icon>
        <span>Tasks</span>
      </a>
      <a class="nav-item" routerLink="reports" routerLinkActive="active" (click)="closeSidebar()">
        <mat-icon class="nav-icon">insert_chart</mat-icon>
        <span>Reports</span>
      </a>
      <a class="nav-item" routerLink="audit-log" routerLinkActive="active" (click)="closeSidebar()">
        <mat-icon class="nav-icon">manage_search</mat-icon>
        <span>Audit Log</span>
      </a>
    </nav>

    <div class="sidebar-bottom" *ngIf="user$ | async as u">
      <div class="user-profile">
        <div class="user-avatar">{{ u.name.charAt(0) }}</div>
        <div class="user-info">
          <span class="user-name">{{ u.name }}</span>
          <span class="user-email">{{ u.email }}</span>
        </div>
      </div>
      <button class="logout-btn" (click)="openChangePassword()" title="Change password">
        <mat-icon>lock</mat-icon>
      </button>
      <button class="logout-btn" (click)="logout()" title="Sign out">
        <mat-icon>logout</mat-icon>
      </button>
    </div>
  </aside>

  <div class="main-area">
    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger-btn" (click)="toggleSidebar()">
          <mat-icon>menu</mat-icon>
        </button>
        <span class="page-breadcrumb">Admin Console</span>
      </div>
      <div class="topbar-right">
        <span class="admin-badge">Administrator</span>
      </div>
    </header>

    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
