<div class="login-page">
  <div class="login-panel">
    <div class="login-inner">

      <div class="login-brand">
        <div class="brand-mark">S</div>
        <span class="brand-label">SSPMS</span>
      </div>

      <div class="login-heading">
        <h1>Reset Password</h1>
        <p>Enter the OTP sent to your email and choose a new password.</p>
      </div>

      <div class="login-form">
        <div class="field-group">
          <label class="field-label">OTP Code</label>
          <mat-form-field appearance="outline" class="field-full">
            <input matInput [(ngModel)]="otp" placeholder="6-digit code"
                   inputmode="numeric" maxlength="6" (keyup.enter)="reset()" />
          </mat-form-field>
        </div>

        <div class="field-group">
          <label class="field-label">New Password</label>
          <mat-form-field appearance="outline" class="field-full">
            <input matInput [type]="showPassword ? 'text' : 'password'" [(ngModel)]="newPassword"
                   placeholder="Min. 8 characters" (keyup.enter)="reset()" />
            <button mat-icon-button matSuffix type="button" (click)="showPassword = !showPassword"
                    style="color:var(--c-text-3)">
              <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </mat-form-field>
        </div>

        <button class="submit-btn" (click)="reset()" [disabled]="loading || !otp.trim() || !newPassword.trim()">
          <mat-spinner *ngIf="loading" diameter="18"></mat-spinner>
          <span *ngIf="!loading">Reset Password</span>
        </button>

        <p class="alt-link"><a routerLink="/login">Back to Login</a></p>
      </div>

    </div>
  </div>

  <div class="hero-panel">
    <div class="hero-content">
      <div class="hero-badge">
        <mat-icon style="font-size:14px;width:14px;height:14px">lock</mat-icon>
        New Password
      </div>
      <h2 class="hero-title">Create a strong<br/>new password</h2>
      <p class="hero-sub">Use the one-time code from your email to set a new password. The code expires in 15 minutes.</p>
    </div>
  </div>
</div>
